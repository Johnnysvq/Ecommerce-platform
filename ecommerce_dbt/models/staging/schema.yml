version: 2

models:
  - name: stg_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: unit_price
        tests:
          - not_null
      - name: product_category
        tests:
          - not_null


  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null

  - name: stg_users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null